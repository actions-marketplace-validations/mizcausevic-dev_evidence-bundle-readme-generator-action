name: "Evidence Bundle README Generator"
description: "Render a Markdown README from an evidence-bundle manifest. Post as PR comment or commit to a target path."
author: "mizcausevic-dev"
branding:
  icon: "book-open"
  color: "purple"

inputs:
  manifest-path:
    description: "Path (relative to repo root) to the evidence-bundle manifest JSON file."
    required: true
  output-path:
    description: "Optional file destination for the rendered Markdown."
    required: false
  comment-on-pr:
    description: "Post the rendered Markdown as a PR comment. 'auto' (default) posts only on pull_request events."
    required: false
    default: "auto"
  hide-badges:
    description: "Suppress the trailing badges line (default 'false')."
    required: false
    default: "false"
  anchor-prefix:
    description: "Anchor prefix for item-row anchors in the items table (default 'item-')."
    required: false
    default: "item-"
  github-token:
    description: "Token used to post the PR comment (defaults to GITHUB_TOKEN)."
    required: false
    default: ${{ github.token }}

outputs:
  markdown-length:
    description: "Length (in characters) of the rendered Markdown."
  output-written:
    description: "True iff an output-path was specified and successfully written."

runs:
  using: "node20"
  main: "dist/index.js"
